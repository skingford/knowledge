<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#ffb300"/>
    </linearGradient>
    <linearGradient id="reqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="rejectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="genGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb300"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ee5a24"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fc" rx="12"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="860" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">令牌桶算法 Token Bucket</text>

  <!-- ===== LEFT: Diagram ===== -->
  <rect x="20" y="80" width="520" height="520" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="280" y="110" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">算法示意图</text>

  <!-- Token Generator (top-left) -->
  <rect x="60" y="130" width="140" height="45" rx="10" fill="url(#genGrad)" filter="url(#shadow)"/>
  <text x="130" y="158" text-anchor="middle" fill="white" font-size="13" font-weight="bold">令牌生成器</text>

  <!-- Token generation arrow -->
  <text x="130" y="195" text-anchor="middle" fill="#e91e63" font-size="11">固定速率 r 生成令牌</text>
  <line x1="130" y1="200" x2="130" y2="225" stroke="#ffb300" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Token symbols falling -->
  <circle cx="100" cy="215" r="8" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="100" y="219" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">T</text>
  <circle cx="130" cy="220" r="8" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="130" y="224" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">T</text>
  <circle cx="160" cy="215" r="8" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="160" y="219" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">T</text>

  <!-- Bucket body -->
  <path d="M 70 235 L 70 410 L 190 410 L 190 235" fill="url(#bucketGrad)" stroke="#f9a825" stroke-width="2.5"/>
  <line x1="70" y1="235" x2="70" y2="410" stroke="#f9a825" stroke-width="3"/>
  <line x1="190" y1="235" x2="190" y2="410" stroke="#f9a825" stroke-width="3"/>
  <line x1="70" y1="410" x2="190" y2="410" stroke="#f9a825" stroke-width="3"/>

  <!-- Tokens in bucket -->
  <circle cx="100" cy="385" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="100" y="389" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="130" cy="385" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="130" y="389" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="160" cy="385" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="160" y="389" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="100" cy="360" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="100" y="364" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="130" cy="360" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="130" y="364" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="160" cy="360" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="160" y="364" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="115" cy="335" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="115" y="339" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>
  <circle cx="145" cy="335" r="10" fill="url(#tokenGrad)" stroke="#f9a825" stroke-width="1.5"/>
  <text x="145" y="339" text-anchor="middle" fill="#795548" font-size="10" font-weight="bold">T</text>

  <!-- Bucket label -->
  <text x="130" y="275" text-anchor="middle" fill="#f57f17" font-size="12" font-weight="bold">令牌桶</text>
  <text x="130" y="293" text-anchor="middle" fill="#f57f17" font-size="11">最大容量 B</text>

  <!-- Overflow label (bucket full) -->
  <path d="M 185 250 Q 220 230 245 255" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="250" y="255" fill="#f57f17" font-size="11">桶满时</text>
  <text x="250" y="270" fill="#f57f17" font-size="11">丢弃新令牌</text>

  <!-- Incoming requests (right side) -->
  <text x="380" y="145" text-anchor="middle" fill="#667eea" font-size="13" font-weight="bold">请求到达</text>

  <rect x="355" y="158" width="50" height="22" rx="4" fill="url(#reqGrad)" opacity="0.9"/>
  <text x="380" y="173" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="355" y="188" width="50" height="22" rx="4" fill="url(#reqGrad)" opacity="0.8"/>
  <text x="380" y="203" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="355" y="218" width="50" height="22" rx="4" fill="url(#reqGrad)" opacity="0.7"/>
  <text x="380" y="233" text-anchor="middle" fill="white" font-size="10">req</text>

  <!-- Decision point -->
  <line x1="380" y1="245" x2="380" y2="290" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Decision diamond -->
  <polygon points="380,295 430,330 380,365 330,330" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="380" y="327" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">有令牌？</text>
  <text x="380" y="343" text-anchor="middle" fill="#e65100" font-size="10">取走一个</text>

  <!-- Arrow from bucket to decision -->
  <path d="M 190 370 Q 260 370 330 340" fill="none" stroke="#ffb300" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrowGold)"/>
  <text x="250" y="360" text-anchor="middle" fill="#f57f17" font-size="10">消耗令牌</text>

  <!-- Yes path - Pass -->
  <line x1="380" y1="365" x2="380" y2="420" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="395" y="395" fill="#2e7d32" font-size="12" font-weight="bold">有</text>

  <rect x="320" y="425" width="120" height="40" rx="10" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="380" y="450" text-anchor="middle" fill="white" font-size="13" font-weight="bold">放行请求</text>

  <!-- Burst note -->
  <rect x="295" y="475" width="170" height="40" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="380" y="495" text-anchor="middle" fill="#2e7d32" font-size="11">桶中有多个令牌时</text>
  <text x="380" y="510" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">允许突发流量通过</text>

  <!-- No path - Reject -->
  <line x1="430" y1="330" x2="485" y2="330" stroke="#ee5a24" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="460" y="322" fill="#c62828" font-size="12" font-weight="bold">无</text>

  <rect x="488" y="310" width="40" height="40" rx="8" fill="#fff5f5" stroke="#ee5a24" stroke-width="1.5"/>
  <text x="508" y="326" text-anchor="middle" fill="#ee5a24" font-size="9" font-weight="bold">拒绝</text>
  <text x="508" y="342" text-anchor="middle" fill="#ee5a24" font-size="9">或排队</text>

  <!-- ===== RIGHT: Key Points ===== -->
  <rect x="560" y="80" width="320" height="520" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="720" y="110" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">核心特征</text>

  <!-- Point 1 -->
  <rect x="580" y="125" width="280" height="70" rx="8" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
  <text x="600" y="148" fill="#f57f17" font-size="13" font-weight="bold">1. 令牌匀速生成</text>
  <text x="600" y="168" fill="#555" font-size="12">以固定速率 r 向桶中添加令牌，</text>
  <text x="600" y="185" fill="#555" font-size="12">桶满则丢弃多余令牌</text>

  <!-- Point 2 -->
  <rect x="580" y="205" width="280" height="70" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="600" y="228" fill="#2e7d32" font-size="13" font-weight="bold">2. 允许突发流量</text>
  <text x="600" y="248" fill="#555" font-size="12">桶中有积攒的令牌时，可以一次性</text>
  <text x="600" y="265" fill="#555" font-size="12">消耗多个，允许短暂流量尖峰</text>

  <!-- Point 3 -->
  <rect x="580" y="285" width="280" height="70" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
  <text x="600" y="308" fill="#1565c0" font-size="13" font-weight="bold">3. 按需消耗</text>
  <text x="600" y="328" fill="#555" font-size="12">每个请求到达时检查桶中是否有</text>
  <text x="600" y="345" fill="#555" font-size="12">令牌，有则消耗一个并放行</text>

  <!-- Point 4 -->
  <rect x="580" y="365" width="280" height="70" rx="8" fill="#fce4ec" stroke="#ef5350" stroke-width="1"/>
  <text x="600" y="388" fill="#c62828" font-size="13" font-weight="bold">4. 长期平均速率受控</text>
  <text x="600" y="408" fill="#555" font-size="12">虽然允许突发，但长期来看处理</text>
  <text x="600" y="425" fill="#555" font-size="12">速率不会超过令牌生成速率 r</text>

  <!-- Typical usage -->
  <rect x="580" y="450" width="280" height="130" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1"/>
  <text x="600" y="475" fill="#6a1b9a" font-size="13" font-weight="bold">典型应用场景</text>
  <text x="600" y="498" fill="#555" font-size="12">• Guava RateLimiter</text>
  <text x="600" y="518" fill="#555" font-size="12">• AWS / Google Cloud API 限流</text>
  <text x="600" y="538" fill="#555" font-size="12">• TCP 拥塞控制</text>
  <text x="600" y="558" fill="#555" font-size="12">• 需要容忍突发的 API Gateway</text>
</svg>
