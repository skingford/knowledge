<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="preGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="duringGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="postGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="rejectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#fb8c00"/>
    </linearGradient>
    <linearGradient id="reqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="feedbackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42a5f5"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ab47bc"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ee5a24"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e91e63"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="700" fill="#f8f9fc" rx="12"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="920" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="480" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">支付反欺诈全链路设计 Anti-Fraud Pipeline</text>

  <!-- ===== TOP: Three-Phase Flow ===== -->
  <rect x="20" y="80" width="920" height="410" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Phase labels -->
  <text x="170" y="108" text-anchor="middle" fill="#1565c0" font-size="15" font-weight="bold">事前 Pre</text>
  <text x="480" y="108" text-anchor="middle" fill="#e65100" font-size="15" font-weight="bold">事中 During</text>
  <text x="790" y="108" text-anchor="middle" fill="#6a1b9a" font-size="15" font-weight="bold">事后 Post</text>

  <!-- Phase dividers -->
  <line x1="320" y1="90" x2="320" y2="480" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5"/>
  <line x1="630" y1="90" x2="630" y2="480" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5"/>

  <!-- ===== PHASE 1: 事前 ===== -->
  <rect x="40" y="120" width="260" height="355" rx="8" fill="url(#preGrad)" opacity="0.3"/>

  <!-- Step: 注册审核 -->
  <rect x="60" y="135" width="220" height="42" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="153" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">注册审核</text>
  <text x="170" y="170" text-anchor="middle" fill="#555" font-size="10">手机号 + IP 风险评估</text>
  <line x1="170" y1="177" x2="170" y2="195" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step: KYC 认证 -->
  <rect x="60" y="198" width="220" height="42" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="216" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">KYC 认证</text>
  <text x="170" y="233" text-anchor="middle" fill="#555" font-size="10">身份验证 + 人脸比对</text>
  <line x1="170" y1="240" x2="170" y2="258" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step: 设备指纹 -->
  <rect x="60" y="261" width="220" height="42" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="279" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">设备指纹采集</text>
  <text x="170" y="296" text-anchor="middle" fill="#555" font-size="10">浏览器 / APP / SDK</text>
  <line x1="170" y1="303" x2="170" y2="321" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step: 行为基线 -->
  <rect x="60" y="324" width="220" height="42" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="342" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">行为基线建立</text>
  <text x="170" y="359" text-anchor="middle" fill="#555" font-size="10">正常行为画像 → 后续对比基准</text>

  <!-- Step: 商户准入 -->
  <rect x="60" y="380" width="220" height="42" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="398" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="bold">商户准入审核</text>
  <text x="170" y="415" text-anchor="middle" fill="#555" font-size="10">营业执照 + 行业 + 历史记录</text>

  <!-- Arrow from Pre to During -->
  <line x1="280" y1="300" x2="340" y2="300" stroke="#78909c" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ===== PHASE 2: 事中 ===== -->
  <rect x="340" y="120" width="275" height="355" rx="8" fill="url(#duringGrad)" opacity="0.3"/>

  <!-- Step: 交易请求 -->
  <rect x="365" y="135" width="225" height="36" rx="8" fill="url(#reqGrad)" filter="url(#shadow)"/>
  <text x="477" y="158" text-anchor="middle" fill="white" font-size="12" font-weight="bold">交易请求到达</text>
  <line x1="477" y1="171" x2="477" y2="189" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Step: 特征提取 -->
  <rect x="365" y="192" width="225" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="477" y="212" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">特征提取 (&lt; 50ms)</text>
  <text x="477" y="232" text-anchor="middle" fill="#555" font-size="10">速度 / 金额偏差 / 地理跳跃 / 设备</text>
  <line x1="477" y1="242" x2="477" y2="260" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Parallel: Rule + Model -->
  <rect x="365" y="263" width="105" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="417" y="283" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">规则引擎</text>
  <text x="417" y="300" text-anchor="middle" fill="#555" font-size="9">硬性兜底</text>

  <rect x="485" y="263" width="105" height="50" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="537" y="283" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold">评分模型</text>
  <text x="537" y="300" text-anchor="middle" fill="#555" font-size="9">精细判断</text>

  <text x="477" y="260" text-anchor="middle" fill="#78909c" font-size="9">并行</text>

  <!-- Merge to decision -->
  <line x1="417" y1="313" x2="477" y2="333" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="537" y1="313" x2="477" y2="333" stroke="#ab47bc" stroke-width="1.5"/>

  <!-- Decision diamond -->
  <polygon points="477,333 527,358 477,383 427,358" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="477" y="355" text-anchor="middle" fill="#e65100" font-size="10" font-weight="bold">综合</text>
  <text x="477" y="368" text-anchor="middle" fill="#e65100" font-size="10" font-weight="bold">决策</text>

  <!-- Three outcomes -->
  <!-- Low risk: pass -->
  <line x1="427" y1="358" x2="367" y2="408" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="345" y="408" width="80" height="30" rx="6" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="385" y="427" text-anchor="middle" fill="white" font-size="10" font-weight="bold">低风险</text>
  <text x="385" y="448" text-anchor="middle" fill="#2e7d32" font-size="9">直接通过</text>

  <!-- Medium risk: verify -->
  <line x1="477" y1="383" x2="477" y2="408" stroke="#fb8c00" stroke-width="2"/>
  <rect x="437" y="408" width="80" height="30" rx="6" fill="url(#warnGrad)" filter="url(#shadow)"/>
  <text x="477" y="427" text-anchor="middle" fill="white" font-size="10" font-weight="bold">中风险</text>
  <text x="477" y="448" text-anchor="middle" fill="#e65100" font-size="9">增强验证</text>
  <text x="477" y="462" text-anchor="middle" fill="#999" font-size="8">3DS / 短信 / 人脸</text>

  <!-- High risk: block -->
  <line x1="527" y1="358" x2="575" y2="408" stroke="#ee5a24" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="555" y="408" width="80" height="30" rx="6" fill="url(#rejectGrad)" filter="url(#shadow)"/>
  <text x="595" y="427" text-anchor="middle" fill="white" font-size="10" font-weight="bold">高风险</text>
  <text x="595" y="448" text-anchor="middle" fill="#c62828" font-size="9">拦截 / 人工</text>

  <!-- Arrow from During to Post -->
  <line x1="615" y1="300" x2="650" y2="300" stroke="#78909c" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ===== PHASE 3: 事后 ===== -->
  <rect x="650" y="120" width="275" height="355" rx="8" fill="url(#postGrad)" opacity="0.3"/>

  <!-- Step: 交易监控 -->
  <rect x="670" y="135" width="235" height="42" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="787" y="153" text-anchor="middle" fill="#6a1b9a" font-size="12" font-weight="bold">交易监控</text>
  <text x="787" y="170" text-anchor="middle" fill="#555" font-size="10">欺诈指标实时大盘 + 异常告警</text>
  <line x1="787" y1="177" x2="787" y2="195" stroke="#ab47bc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Step: 拒付处理 -->
  <rect x="670" y="198" width="235" height="50" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="787" y="218" text-anchor="middle" fill="#6a1b9a" font-size="12" font-weight="bold">拒付处理 Chargeback</text>
  <text x="787" y="236" text-anchor="middle" fill="#555" font-size="10">自动收集举证 → 应诉 → 仲裁</text>
  <line x1="787" y1="248" x2="787" y2="266" stroke="#ab47bc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Step: 案件调查 -->
  <rect x="670" y="269" width="235" height="50" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="787" y="289" text-anchor="middle" fill="#6a1b9a" font-size="12" font-weight="bold">案件调查</text>
  <text x="787" y="307" text-anchor="middle" fill="#555" font-size="10">关联分析 + 时间线还原 + 溯源</text>
  <line x1="787" y1="319" x2="787" y2="337" stroke="#ab47bc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Step: 策略迭代 -->
  <rect x="670" y="340" width="235" height="50" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="787" y="360" text-anchor="middle" fill="#6a1b9a" font-size="12" font-weight="bold">策略迭代</text>
  <text x="787" y="378" text-anchor="middle" fill="#555" font-size="10">新增规则 + 模型重训 + 情报沉淀</text>

  <!-- Feedback loop arrow -->
  <path d="M 787 390 Q 787 420 680 420 Q 500 420 477 260" fill="none" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrowPink)"/>
  <text x="610" y="435" text-anchor="middle" fill="#e91e63" font-size="10" font-weight="bold">闭环反馈 → 规则 + 模型更新</text>

  <!-- Step: 情报共享 -->
  <rect x="670" y="405" width="235" height="42" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="787" y="423" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">情报共享</text>
  <text x="787" y="440" text-anchor="middle" fill="#555" font-size="10">同行 + 卡组织联防</text>

  <!-- ===== BOTTOM: Key Points ===== -->
  <rect x="20" y="500" width="920" height="185" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Fraud Types -->
  <rect x="40" y="515" width="280" height="155" rx="8" fill="#fce4ec" stroke="#ef5350" stroke-width="1"/>
  <text x="60" y="538" fill="#c62828" font-size="13" font-weight="bold">六大欺诈类型速查</text>
  <text x="60" y="560" fill="#555" font-size="11">• 盗卡交易 Card-Not-Present</text>
  <text x="60" y="578" fill="#555" font-size="11">• 试卡攻击 Card Testing</text>
  <text x="60" y="596" fill="#555" font-size="11">• 账户接管 ATO</text>
  <text x="60" y="614" fill="#555" font-size="11">• 友好欺诈 Friendly Fraud</text>
  <text x="60" y="632" fill="#555" font-size="11">• 薅羊毛 Promo Abuse</text>
  <text x="60" y="650" fill="#555" font-size="11">• 洗钱转移 Money Mule</text>

  <!-- Key Metrics -->
  <rect x="340" y="515" width="280" height="155" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="360" y="538" fill="#2e7d32" font-size="13" font-weight="bold">关键指标</text>
  <text x="360" y="563" fill="#555" font-size="11">• 欺诈率 &lt; 0.1%</text>
  <text x="360" y="583" fill="#555" font-size="11">• 拒付率 &lt; 0.5%（红线 0.9%）</text>
  <text x="360" y="603" fill="#555" font-size="11">• 检出率 Recall &gt; 80%</text>
  <text x="360" y="623" fill="#555" font-size="11">• 误报率 FPR &lt; 1%</text>
  <text x="360" y="643" fill="#555" font-size="11">• 应诉成功率 &gt; 40%</text>
  <text x="360" y="660" fill="#999" font-size="10">拒付率是支付业务的生命线指标</text>

  <!-- Core Insight -->
  <rect x="640" y="515" width="280" height="155" rx="8" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
  <text x="660" y="538" fill="#f57f17" font-size="13" font-weight="bold">核心认知</text>
  <text x="660" y="563" fill="#555" font-size="11">反欺诈没有一劳永逸的方案</text>
  <text x="660" y="583" fill="#555" font-size="11">欺诈者会持续调整策略</text>
  <text x="660" y="608" fill="#f57f17" font-size="12" font-weight="bold">建议优先落地</text>
  <text x="660" y="630" fill="#555" font-size="11">1. 集成设备指纹 SDK</text>
  <text x="660" y="648" fill="#555" font-size="11">2. 接入 3DS 验证</text>
  <text x="660" y="666" fill="#555" font-size="11">3. 搭建基础规则引擎</text>
</svg>
