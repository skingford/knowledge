<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" role="img" aria-label="IoT MQTT 消息接入时序图" style="font-family: system-ui, sans-serif;">
  <defs>
    <marker id="iot-seq-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--d-arrow)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="14" y="14" width="952" height="452" rx="22" fill="var(--d-bg)" stroke="var(--d-border)" />

  <!-- Title -->
  <text x="490" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="var(--d-text)">
    IoT MQTT 消息接入时序图
  </text>
  <text x="490" y="62" text-anchor="middle" font-size="12" fill="var(--d-text-sub)">
    HTTP 认证（iot-router）+ MQTT 消息通道（EMQX）双通道分离
  </text>

  <!-- ════════════ Participant Boxes ════════════ -->

  <rect x="28" y="78" width="104" height="46" rx="10"
        fill="var(--d-client-bg)" stroke="var(--d-client-border)" stroke-width="1.5" />
  <text x="80" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-client-text)">MQTT 设备</text>
  <text x="80" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">百万级终端</text>

  <rect x="192" y="78" width="104" height="46" rx="10"
        fill="var(--d-engine-bg)" stroke="var(--d-engine-border)" stroke-width="1.5" />
  <text x="244" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-engine-text)">iot-router</text>
  <text x="244" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">认证网关</text>

  <rect x="356" y="78" width="104" height="46" rx="10"
        fill="var(--d-blue-bg)" stroke="var(--d-blue-border)" stroke-width="1.5" />
  <text x="408" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-blue)">EMQX 集群</text>
  <text x="408" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">MQTT Broker</text>

  <rect x="520" y="78" width="104" height="46" rx="10"
        fill="var(--d-blue-bg)" stroke="var(--d-blue-border)" stroke-width="1.5" />
  <text x="572" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-blue)">iot-emqx</text>
  <text x="572" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">协议转换（Go）</text>

  <rect x="684" y="78" width="104" height="46" rx="10"
        fill="var(--d-blue-bg)" stroke="var(--d-blue-border)" stroke-width="1.5" />
  <text x="736" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-blue)">iot-broker</text>
  <text x="736" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">消息编排</text>

  <rect x="848" y="78" width="104" height="46" rx="10"
        fill="var(--d-client-bg)" stroke="var(--d-client-border)" stroke-width="1.5" />
  <text x="900" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--d-client-text)">业务 Server</text>
  <text x="900" y="114" text-anchor="middle" font-size="10" fill="var(--d-text-muted)">领域消费</text>

  <!-- ════════════ Lifelines ════════════ -->
  <line x1="80"  y1="124" x2="80"  y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />
  <line x1="244" y1="124" x2="244" y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />
  <line x1="408" y1="124" x2="408" y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />
  <line x1="572" y1="124" x2="572" y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />
  <line x1="736" y1="124" x2="736" y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />
  <line x1="900" y1="124" x2="900" y2="380" stroke="var(--d-border)" stroke-width="1.5" stroke-dasharray="6 4" />

  <!-- ════════════ Phase: 认证 ════════════ -->

  <!-- 1. HTTP 认证请求 -->
  <line x1="82" y1="150" x2="240" y2="150"
        stroke="var(--d-engine-border)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="162" y="142" text-anchor="middle" font-size="11" fill="var(--d-text)">
    1  HTTP 白名单认证
  </text>

  <!-- 2. 认证通过 (return, dashed) -->
  <line x1="242" y1="178" x2="84" y2="178"
        stroke="var(--d-engine-border)" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#iot-seq-arrow)" />
  <text x="162" y="170" text-anchor="middle" font-size="11" fill="var(--d-text)">
    2  认证通过
  </text>

  <!-- Phase separator -->
  <line x1="34" y1="196" x2="946" y2="196"
        stroke="var(--d-border)" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4" />

  <!-- ════════════ Phase: MQTT 连接 + 消息流转 ════════════ -->

  <!-- 3. MQTT Connect -->
  <line x1="82" y1="218" x2="404" y2="218"
        stroke="var(--d-arrow)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="326" y="210" text-anchor="middle" font-size="11" fill="var(--d-text)">
    3  MQTT Connect（长连接）
  </text>

  <!-- 4. CONNACK (return, dashed) -->
  <line x1="406" y1="246" x2="84" y2="246"
        stroke="var(--d-arrow)" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#iot-seq-arrow)" />
  <text x="326" y="238" text-anchor="middle" font-size="11" fill="var(--d-text)">
    4  CONNACK
  </text>

  <!-- 5. Publish -->
  <line x1="82" y1="278" x2="404" y2="278"
        stroke="var(--d-arrow)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="326" y="270" text-anchor="middle" font-size="11" fill="var(--d-text)">
    5  Publish（设备数据上报）
  </text>

  <!-- 6. Go Client 长连接消费 -->
  <line x1="410" y1="308" x2="568" y2="308"
        stroke="var(--d-arrow)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="490" y="300" text-anchor="middle" font-size="11" fill="var(--d-text)">
    6  Go Client 长连接消费
  </text>

  <!-- 7. RPC -->
  <line x1="574" y1="338" x2="732" y2="338"
        stroke="var(--d-arrow)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="654" y="330" text-anchor="middle" font-size="11" fill="var(--d-text)">
    7  RPC（标准化消息）
  </text>

  <!-- 8. gRPC 分发 -->
  <line x1="738" y1="368" x2="896" y2="368"
        stroke="var(--d-arrow)" stroke-width="1.5" marker-end="url(#iot-seq-arrow)" />
  <text x="818" y="360" text-anchor="middle" font-size="11" fill="var(--d-text)">
    8  gRPC 分发
  </text>

  <!-- ════════════ Metrics Bar ════════════ -->
  <rect x="60" y="404" width="240" height="34" rx="17" fill="var(--d-bg-alt)" stroke="var(--d-border)" />
  <text x="180" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="var(--d-blue)">100 万 QPS</text>

  <rect x="370" y="404" width="240" height="34" rx="17" fill="var(--d-bg-alt)" stroke="var(--d-border)" />
  <text x="490" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="var(--d-blue)">100 万同时在线</text>

  <rect x="680" y="404" width="240" height="34" rx="17" fill="var(--d-bg-alt)" stroke="var(--d-border)" />
  <text x="800" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="var(--d-blue)">日处理 10 亿+</text>

  <!-- Footer -->
  <text x="490" y="458" text-anchor="middle" font-size="11" fill="var(--d-text-dim)">
    端到端延迟 P99 &lt; 200ms · 可用性 99.99% · 单次发版零断线（EMQX 会话迁移 + 滚动更新）
  </text>
</svg>
