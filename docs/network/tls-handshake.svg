<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="encGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <rect x="20" y="15" width="760" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">TLS 握手流程 (HTTPS = HTTP over TLS)</text>

  <!-- Main card -->
  <rect x="20" y="80" width="760" height="395" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Client / Server headers -->
  <rect x="60" y="95" width="100" height="35" rx="8" fill="url(#clientGrad)"/>
  <text x="110" y="118" text-anchor="middle" fill="white" font-size="13" font-weight="bold">客户端</text>
  <rect x="640" y="95" width="100" height="35" rx="8" fill="url(#serverGrad)"/>
  <text x="690" y="118" text-anchor="middle" fill="white" font-size="13" font-weight="bold">服务端</text>

  <!-- Timelines -->
  <line x1="110" y1="135" x2="110" y2="460" stroke="#4facfe" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="690" y1="135" x2="690" y2="460" stroke="#667eea" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 1: ClientHello -->
  <line x1="115" y1="170" x2="685" y2="195" stroke="#4facfe" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="250" y="160" width="300" height="30" rx="6" fill="#e8f7ff" stroke="#4facfe" stroke-width="1"/>
  <text x="400" y="180" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">① ClientHello</text>
  <text x="400" y="208" text-anchor="middle" fill="#999" font-size="10">TLS 版本 + 支持的加密套件 + 随机数</text>

  <!-- Step 2: ServerHello + Certificate -->
  <line x1="685" y1="240" x2="115" y2="265" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="220" y="230" width="360" height="30" rx="6" fill="#f0edff" stroke="#667eea" stroke-width="1"/>
  <text x="400" y="250" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">② ServerHello + 证书 (Certificate)</text>
  <text x="400" y="278" text-anchor="middle" fill="#999" font-size="10">选择协议参数 + 返回服务端证书链</text>

  <!-- Step 3: Verify + Key Exchange -->
  <rect x="50" y="298" width="180" height="28" rx="6" fill="#fff8e6" stroke="#ff9800" stroke-width="1"/>
  <text x="140" y="317" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">③ 校验证书链 + 域名</text>

  <line x1="115" y1="345" x2="685" y2="370" stroke="#4facfe" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="250" y="337" width="300" height="28" rx="6" fill="#e8f7ff" stroke="#4facfe" stroke-width="1"/>
  <text x="400" y="356" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">④ 密钥协商 (Key Exchange)</text>
  <text x="400" y="385" text-anchor="middle" fill="#999" font-size="10">双方生成会话密钥 (Session Key)</text>

  <!-- Step 5: Encrypted communication -->
  <rect x="90" y="405" width="620" height="35" rx="8" fill="url(#encGrad)" opacity="0.15" stroke="#43e97b" stroke-width="1.5"/>
  <line x1="115" y1="422" x2="685" y2="422" stroke="#43e97b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="400" y="427" text-anchor="middle" fill="#2d9d5c" font-size="12" font-weight="bold">⑤ 加密的 HTTP 请求与响应</text>
  <text x="400" y="455" text-anchor="middle" fill="#999" font-size="10">后续所有 HTTP 报文通过会话密钥加密传输</text>

  <!-- Bottom: Common issues -->
  <rect x="20" y="490" width="760" height="75" rx="10" fill="white" stroke="#fa709a" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="515" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">HTTPS 常见排障点</text>

  <text x="105" y="543" text-anchor="middle" fill="#888" font-size="10">证书过期</text>
  <circle cx="105" cy="536" r="2" fill="#e74c3c"/>

  <text x="225" y="543" text-anchor="middle" fill="#888" font-size="10">证书链不完整</text>
  <circle cx="225" cy="536" r="2" fill="#e74c3c"/>

  <text x="350" y="543" text-anchor="middle" fill="#888" font-size="10">SNI 配置错误</text>
  <circle cx="350" cy="536" r="2" fill="#e74c3c"/>

  <text x="475" y="543" text-anchor="middle" fill="#888" font-size="10">旧 TLS 版本</text>
  <circle cx="475" cy="536" r="2" fill="#e74c3c"/>

  <text x="590" y="543" text-anchor="middle" fill="#888" font-size="10">域名不匹配</text>
  <circle cx="590" cy="536" r="2" fill="#e74c3c"/>

  <text x="710" y="543" text-anchor="middle" fill="#888" font-size="10">TLS 终止位置变更</text>
  <circle cx="710" cy="536" r="2" fill="#e74c3c"/>
</svg>
