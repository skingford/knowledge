<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="overflowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="inGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ee5a24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fc" rx="12"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="860" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">漏桶算法 Leaky Bucket</text>

  <!-- ===== LEFT: Diagram ===== -->
  <rect x="20" y="80" width="520" height="520" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="280" y="110" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">算法示意图</text>

  <!-- Incoming requests (top) -->
  <text x="280" y="140" text-anchor="middle" fill="#667eea" font-size="13" font-weight="bold">请求流入（不规则速率）</text>

  <!-- Irregular incoming arrows -->
  <rect x="130" y="152" width="50" height="22" rx="4" fill="url(#inGrad)" opacity="0.9"/>
  <text x="155" y="167" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="195" y="152" width="50" height="22" rx="4" fill="url(#inGrad)" opacity="0.9"/>
  <text x="220" y="167" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="255" y="152" width="50" height="22" rx="4" fill="url(#inGrad)" opacity="0.7"/>
  <text x="280" y="167" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="320" y="152" width="50" height="22" rx="4" fill="url(#inGrad)" opacity="0.9"/>
  <text x="345" y="167" text-anchor="middle" fill="white" font-size="10">req</text>
  <rect x="385" y="152" width="50" height="22" rx="4" fill="url(#inGrad)" opacity="0.6"/>
  <text x="410" y="167" text-anchor="middle" fill="white" font-size="10">req</text>

  <!-- Funnel / entry arrows down -->
  <line x1="280" y1="180" x2="280" y2="205" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Bucket body -->
  <path d="M 180 210 L 180 430 L 380 430 L 380 210" fill="url(#bucketGrad)" stroke="#7986cb" stroke-width="2.5"/>
  <!-- Bucket left wall -->
  <line x1="180" y1="210" x2="180" y2="430" stroke="#5c6bc0" stroke-width="3"/>
  <!-- Bucket right wall -->
  <line x1="380" y1="210" x2="380" y2="430" stroke="#5c6bc0" stroke-width="3"/>
  <!-- Bucket bottom -->
  <line x1="180" y1="430" x2="380" y2="430" stroke="#5c6bc0" stroke-width="3"/>

  <!-- Water level in bucket -->
  <rect x="182" y="290" width="196" height="138" fill="url(#waterGrad)" opacity="0.6" rx="2"/>
  <text x="280" y="365" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">队列缓冲区</text>
  <text x="280" y="385" text-anchor="middle" fill="#1565c0" font-size="11">(Buffer Queue)</text>

  <!-- Capacity label -->
  <line x1="390" y1="215" x2="420" y2="215" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="390" y1="428" x2="420" y2="428" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="415" y1="215" x2="415" y2="428" stroke="#5c6bc0" stroke-width="1.5"/>
  <line x1="410" y1="215" x2="420" y2="215" stroke="#5c6bc0" stroke-width="1.5"/>
  <line x1="410" y1="428" x2="420" y2="428" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="440" y="325" text-anchor="start" fill="#5c6bc0" font-size="12" font-weight="bold">容量</text>
  <text x="440" y="342" text-anchor="start" fill="#5c6bc0" font-size="11">(Capacity)</text>

  <!-- Overflow indicator -->
  <path d="M 375 220 Q 420 200 460 230" fill="none" stroke="url(#overflowGrad)" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="460" y="200" width="65" height="50" rx="8" fill="#fff5f5" stroke="#ee5a24" stroke-width="1.5"/>
  <text x="492" y="222" text-anchor="middle" fill="#ee5a24" font-size="11" font-weight="bold">溢出</text>
  <text x="492" y="238" text-anchor="middle" fill="#ee5a24" font-size="10">丢弃请求</text>

  <!-- Outflow (bottom) - constant rate -->
  <rect x="255" y="432" width="50" height="8" fill="#5c6bc0" rx="2"/>
  <!-- Drip hole -->
  <rect x="268" y="440" width="24" height="6" fill="#43e97b" rx="2"/>

  <!-- Constant rate output drops -->
  <circle cx="280" cy="460" r="6" fill="url(#outGrad)" opacity="0.9"/>
  <circle cx="280" cy="478" r="6" fill="url(#outGrad)" opacity="0.7"/>
  <circle cx="280" cy="496" r="6" fill="url(#outGrad)" opacity="0.5"/>

  <line x1="280" y1="505" x2="280" y2="535" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Output label -->
  <rect x="205" y="540" width="150" height="36" rx="8" fill="url(#outGrad)" filter="url(#shadow)"/>
  <text x="280" y="563" text-anchor="middle" fill="white" font-size="13" font-weight="bold">恒定速率流出</text>

  <!-- Rate label -->
  <text x="280" y="590" text-anchor="middle" fill="#2e7d32" font-size="12">固定速率 r（requests/sec）</text>

  <!-- ===== RIGHT: Key Points ===== -->
  <rect x="560" y="80" width="320" height="520" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="720" y="110" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">核心特征</text>

  <!-- Point 1 -->
  <rect x="580" y="125" width="280" height="70" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="600" y="148" fill="#2e7d32" font-size="13" font-weight="bold">1. 恒定速率输出</text>
  <text x="600" y="168" fill="#555" font-size="12">无论输入多快，输出始终按固定速率</text>
  <text x="600" y="185" fill="#555" font-size="12">处理请求，实现流量整形</text>

  <!-- Point 2 -->
  <rect x="580" y="205" width="280" height="70" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
  <text x="600" y="228" fill="#1565c0" font-size="13" font-weight="bold">2. 缓冲队列</text>
  <text x="600" y="248" fill="#555" font-size="12">到达速率 > 处理速率时，请求在</text>
  <text x="600" y="265" fill="#555" font-size="12">队列中排队等待</text>

  <!-- Point 3 -->
  <rect x="580" y="285" width="280" height="70" rx="8" fill="#fff3e0" stroke="#ffa726" stroke-width="1"/>
  <text x="600" y="308" fill="#e65100" font-size="13" font-weight="bold">3. 溢出丢弃</text>
  <text x="600" y="328" fill="#555" font-size="12">队列满时，新到达的请求直接丢弃</text>
  <text x="600" y="345" fill="#555" font-size="12">（或返回限流响应）</text>

  <!-- Point 4 -->
  <rect x="580" y="365" width="280" height="70" rx="8" fill="#fce4ec" stroke="#ef5350" stroke-width="1"/>
  <text x="600" y="388" fill="#c62828" font-size="13" font-weight="bold">4. 不允许突发</text>
  <text x="600" y="408" fill="#555" font-size="12">即使桶空了，也不能一次性处理</text>
  <text x="600" y="425" fill="#555" font-size="12">大量请求，输出永远是匀速的</text>

  <!-- Typical usage -->
  <rect x="580" y="450" width="280" height="130" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1"/>
  <text x="600" y="475" fill="#6a1b9a" font-size="13" font-weight="bold">典型应用场景</text>
  <text x="600" y="498" fill="#555" font-size="12">• Nginx limit_req 模块</text>
  <text x="600" y="518" fill="#555" font-size="12">• 网络流量整形（Traffic Shaping）</text>
  <text x="600" y="538" fill="#555" font-size="12">• 消息队列消费速率控制</text>
  <text x="600" y="558" fill="#555" font-size="12">• 需要严格平滑输出的场景</text>
</svg>
