<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 750" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="slotActiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="slotStaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2"/>
      <stop offset="100%" style="stop-color:#ef9a9a"/>
    </linearGradient>
    <linearGradient id="slotNullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#bdbdbd"/>
    </linearGradient>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="adderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <linearGradient id="casGreenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="casBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="casRedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="750" fill="#f8f9fc" rx="12"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="920" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="480" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Sentinel LeapArray 无锁滑动窗口</text>

  <!-- ===== TOP: Data Structure Hierarchy ===== -->
  <rect x="20" y="80" width="920" height="290" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="108" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">数据结构层级：LeapArray → WindowWrap → MetricBucket → LongAdder[]</text>

  <!-- Circular Array visualization -->
  <!-- LeapArray outer frame -->
  <rect x="40" y="122" width="880" height="35" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="60" y="145" fill="#6a1b9a" font-size="13" font-weight="bold">LeapArray&lt;MetricBucket&gt;</text>
  <text x="430" y="145" fill="#9c27b0" font-size="11">AtomicReferenceArray&lt;WindowWrap&lt;MetricBucket&gt;&gt;  |  sampleCount = 4  |  intervalInMs = 1000  |  windowLengthInMs = 250</text>

  <!-- 4 slots -->
  <!-- Slot 0 - active (current) -->
  <rect x="50" y="168" width="200" height="55" rx="8" fill="url(#slotActiveGrad)" opacity="0.3" stroke="#2e7d32" stroke-width="2"/>
  <text x="150" y="187" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">槽 0 — 当前窗口</text>
  <text x="150" y="205" text-anchor="middle" fill="#2e7d32" font-size="11">windowStart = 1000</text>
  <circle cx="60" cy="190" r="6" fill="#43e97b" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- Slot 1 - active -->
  <rect x="265" y="168" width="200" height="55" rx="8" fill="url(#slotActiveGrad)" opacity="0.2" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="365" y="187" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">槽 1</text>
  <text x="365" y="205" text-anchor="middle" fill="#2e7d32" font-size="11">windowStart = 750</text>

  <!-- Slot 2 - stale -->
  <rect x="480" y="168" width="200" height="55" rx="8" fill="url(#slotStaleGrad)" opacity="0.4" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="580" y="187" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">槽 2 — 已过期</text>
  <text x="580" y="205" text-anchor="middle" fill="#c62828" font-size="11">windowStart = 500 (stale)</text>
  <circle cx="490" cy="190" r="6" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>

  <!-- Slot 3 - null -->
  <rect x="695" y="168" width="200" height="55" rx="8" fill="url(#slotNullGrad)" opacity="0.4" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="795" y="187" text-anchor="middle" fill="#616161" font-size="12" font-weight="bold">槽 3 — null</text>
  <text x="795" y="205" text-anchor="middle" fill="#757575" font-size="11">未初始化</text>
  <circle cx="705" cy="190" r="6" fill="#bdbdbd" stroke="#757575" stroke-width="1.5"/>

  <!-- Expand slot 0 to show internals -->
  <line x1="150" y1="223" x2="150" y2="240" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- WindowWrap -->
  <rect x="40" y="245" width="440" height="38" rx="6" fill="url(#bucketGrad)" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="55" y="269" fill="#1565c0" font-size="12" font-weight="bold">WindowWrap&lt;MetricBucket&gt;</text>
  <text x="290" y="269" fill="#1565c0" font-size="11">windowStart: long  |  windowLength: long  |  value: MetricBucket</text>

  <!-- Arrow to MetricBucket -->
  <line x1="260" y1="283" x2="260" y2="298" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- MetricBucket -->
  <rect x="40" y="303" width="440" height="55" rx="6" fill="url(#adderGrad)" stroke="#ffa000" stroke-width="1.5"/>
  <text x="55" y="325" fill="#e65100" font-size="12" font-weight="bold">MetricBucket</text>
  <text x="200" y="325" fill="#795548" font-size="11">LongAdder[] counters — 每个事件类型一个</text>

  <!-- LongAdder cells -->
  <rect x="55" y="333" width="65" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="87" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">PASS</text>
  <rect x="125" y="333" width="65" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="157" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">BLOCK</text>
  <rect x="195" y="333" width="65" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="227" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">EXCEPTION</text>
  <rect x="265" y="333" width="65" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="297" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">SUCCESS</text>
  <rect x="335" y="333" width="45" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="357" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">RT</text>
  <rect x="385" y="333" width="80" height="18" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/>
  <text x="425" y="346" text-anchor="middle" fill="#795548" font-size="9" font-weight="bold">OCCUPIED</text>

  <!-- Index formula box -->
  <rect x="510" y="250" width="420" height="108" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1" filter="url(#shadow)"/>
  <text x="720" y="275" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">索引计算公式</text>
  <text x="530" y="300" fill="#1565c0" font-size="12" font-weight="bold">槽索引:</text>
  <text x="625" y="300" fill="#333" font-size="12">(timeMs / windowLengthInMs) % sampleCount</text>
  <text x="530" y="322" fill="#e65100" font-size="12" font-weight="bold">窗口起始:</text>
  <text x="643" y="322" fill="#333" font-size="12">timeMs - (timeMs % windowLengthInMs)</text>
  <text x="530" y="348" fill="#666" font-size="11">例: time=1050, windowLen=250, samples=4</text>
  <text x="530" y="365" fill="#666" font-size="11">→ idx = (1050/250) % 4 = 4 % 4 = 0, start = 1000</text>

  <!-- ===== BOTTOM: CAS 3-Branch Logic ===== -->
  <rect x="20" y="385" width="920" height="345" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="413" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">currentWindow() 三分支逻辑 — 几乎无锁的关键</text>

  <!-- Entry -->
  <rect x="380" y="430" width="200" height="35" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="480" y="453" text-anchor="middle" fill="#283593" font-size="13" font-weight="bold">计算 idx 和 windowStart</text>

  <!-- Arrow down -->
  <line x1="480" y1="465" x2="480" y2="485" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Decision: check old slot -->
  <polygon points="480,490 560,520 480,550 400,520" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="480" y="518" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">old = array[idx]</text>
  <text x="480" y="533" text-anchor="middle" fill="#333" font-size="10">检查状态</text>

  <!-- Branch 1: null → CAS create (left) -->
  <line x1="400" y1="520" x2="220" y2="520" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="310" y="512" text-anchor="middle" fill="#616161" font-size="11" font-weight="bold">old == null</text>

  <rect x="40" y="495" width="175" height="95" rx="8" fill="url(#slotNullGrad)" opacity="0.3" stroke="#757575" stroke-width="1.5"/>
  <text x="127" y="518" text-anchor="middle" fill="#424242" font-size="12" font-weight="bold">分支 1: CAS 创建</text>
  <text x="127" y="538" text-anchor="middle" fill="#555" font-size="11">new WindowWrap(...)</text>
  <text x="127" y="556" text-anchor="middle" fill="#555" font-size="11">array.compareAndSet(</text>
  <text x="127" y="572" text-anchor="middle" fill="#555" font-size="11">  idx, null, window)</text>

  <rect x="45" y="596" width="165" height="24" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="127" y="613" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">纯 CAS，完全无锁</text>

  <!-- Branch 2: current → return (center-down) -->
  <line x1="480" y1="550" x2="480" y2="600" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="510" y="575" fill="#2e7d32" font-size="11" font-weight="bold">windowStart 匹配</text>

  <rect x="390" y="605" width="180" height="55" rx="8" fill="url(#casGreenGrad)" stroke="#43a047" stroke-width="1.5"/>
  <text x="480" y="628" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">分支 2: 直接返回</text>
  <text x="480" y="648" text-anchor="middle" fill="#2e7d32" font-size="11">return old（零开销热路径）</text>

  <rect x="398" y="666" width="164" height="24" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="480" y="683" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">99%+ 请求走这条路</text>

  <!-- Branch 3: stale → tryLock reset (right) -->
  <line x1="560" y1="520" x2="720" y2="520" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="640" y="512" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">windowStart 过期</text>

  <rect x="725" y="488" width="210" height="110" rx="8" fill="url(#casRedGrad)" stroke="#e65100" stroke-width="1.5"/>
  <text x="830" y="512" text-anchor="middle" fill="#bf360c" font-size="12" font-weight="bold">分支 3: tryLock 重置</text>
  <text x="830" y="532" text-anchor="middle" fill="#555" font-size="11">updateLock.tryLock()</text>
  <text x="830" y="550" text-anchor="middle" fill="#555" font-size="11">resetWindowTo(old, start)</text>
  <text x="830" y="568" text-anchor="middle" fill="#555" font-size="11">→ 重置时间戳 + 清零计数</text>
  <text x="830" y="586" text-anchor="middle" fill="#555" font-size="11">unlock() 后返回</text>

  <rect x="740" y="604" width="180" height="40" rx="4" fill="#fff3e0" stroke="#ffa000" stroke-width="1"/>
  <text x="830" y="620" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">极少触发（窗口过期时）</text>
  <text x="830" y="636" text-anchor="middle" fill="#e65100" font-size="10">tryLock 非阻塞，失败 yield</text>

  <!-- Summary bar -->
  <rect x="40" y="700" width="900" height="28" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1"/>
  <text x="480" y="719" text-anchor="middle" fill="#283593" font-size="12" font-weight="bold">设计核心：环形数组避免 GC + LongAdder 避免写竞争 + CAS / tryLock 避免全局锁 → 高并发下几乎无锁</text>
</svg>
