<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="transGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <rect x="20" y="15" width="860" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">TCP/IP 四层网络模型</text>

  <!-- Column Headers -->
  <text x="130" y="95" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">层次</text>
  <text x="370" y="95" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">关键协议</text>
  <text x="700" y="95" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">典型问题</text>

  <!-- Layer 1: Application -->
  <rect x="30" y="110" width="200" height="90" rx="10" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="130" y="147" text-anchor="middle" fill="white" font-size="16" font-weight="bold">应用层</text>
  <text x="130" y="170" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">Application</text>

  <rect x="250" y="110" width="250" height="90" rx="10" fill="white" stroke="#667eea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="140" text-anchor="middle" fill="#333" font-size="13">HTTP / HTTPS / DNS</text>
  <text x="375" y="162" text-anchor="middle" fill="#333" font-size="13">WebSocket / gRPC</text>
  <text x="375" y="184" text-anchor="middle" fill="#333" font-size="13">TLS / SSH</text>

  <rect x="520" y="110" width="350" height="90" rx="10" fill="white" stroke="#667eea" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="140" text-anchor="middle" fill="#666" font-size="12">502/504 错误、证书失败</text>
  <text x="695" y="162" text-anchor="middle" fill="#666" font-size="12">域名解析异常、跨层代理问题</text>
  <text x="695" y="184" text-anchor="middle" fill="#666" font-size="12">Header 过大被拒绝</text>

  <!-- Arrow between layers -->
  <line x1="130" y1="200" x2="130" y2="215" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Transport -->
  <rect x="30" y="220" width="200" height="90" rx="10" fill="url(#transGrad)" filter="url(#shadow)"/>
  <text x="130" y="257" text-anchor="middle" fill="white" font-size="16" font-weight="bold">传输层</text>
  <text x="130" y="280" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">Transport</text>

  <rect x="250" y="220" width="250" height="90" rx="10" fill="white" stroke="#4facfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="255" text-anchor="middle" fill="#333" font-size="13">TCP / UDP</text>
  <text x="375" y="277" text-anchor="middle" fill="#333" font-size="13">端口 / 连接状态</text>

  <rect x="520" y="220" width="350" height="90" rx="10" fill="white" stroke="#4facfe" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="250" text-anchor="middle" fill="#666" font-size="12">建连超时、RST</text>
  <text x="695" y="272" text-anchor="middle" fill="#666" font-size="12">丢包重传、连接堆积</text>
  <text x="695" y="294" text-anchor="middle" fill="#666" font-size="12">TIME_WAIT 过多</text>

  <!-- Arrow -->
  <line x1="130" y1="310" x2="130" y2="325" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Network -->
  <rect x="30" y="330" width="200" height="90" rx="10" fill="url(#netGrad)" filter="url(#shadow)"/>
  <text x="130" y="367" text-anchor="middle" fill="white" font-size="16" font-weight="bold">网络层</text>
  <text x="130" y="390" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">Network</text>

  <rect x="250" y="330" width="250" height="90" rx="10" fill="white" stroke="#43e97b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="365" text-anchor="middle" fill="#333" font-size="13">IP / ICMP / ARP</text>
  <text x="375" y="387" text-anchor="middle" fill="#333" font-size="13">路由 / NAT / 子网</text>

  <rect x="520" y="330" width="350" height="90" rx="10" fill="white" stroke="#43e97b" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="360" text-anchor="middle" fill="#666" font-size="12">路由不通、跨网段访问失败</text>
  <text x="695" y="382" text-anchor="middle" fill="#666" font-size="12">Traceroute 中断</text>
  <text x="695" y="404" text-anchor="middle" fill="#666" font-size="12">NAT 映射异常</text>

  <!-- Arrow -->
  <line x1="130" y1="420" x2="130" y2="435" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Link -->
  <rect x="30" y="440" width="200" height="65" rx="10" fill="url(#linkGrad)" filter="url(#shadow)"/>
  <text x="130" y="472" text-anchor="middle" fill="white" font-size="16" font-weight="bold">链路层</text>

  <rect x="250" y="440" width="250" height="65" rx="10" fill="white" stroke="#fa709a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="478" text-anchor="middle" fill="#333" font-size="13">Ethernet / MAC / MTU</text>

  <rect x="520" y="440" width="350" height="65" rx="10" fill="white" stroke="#fa709a" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="473" text-anchor="middle" fill="#666" font-size="12">同网段通信异常、ARP 冲突</text>
  <text x="695" y="493" text-anchor="middle" fill="#666" font-size="12">MTU 不匹配导致分片</text>

  <!-- Side label: data flow direction -->
  <text x="15" y="310" text-anchor="middle" fill="#aaa" font-size="11" transform="rotate(-90 15 310)">数据封装方向 ↓</text>
</svg>
