<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 700" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="twGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1050" height="700" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <rect x="20" y="15" width="1010" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="525" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">TCP 连接管理：三次握手 &amp; 四次挥手</text>

  <!-- ===== LEFT: Three-Way Handshake ===== -->
  <rect x="20" y="80" width="490" height="420" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="265" y="108" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">三次握手（建连）</text>

  <!-- Client / Server columns -->
  <rect x="60" y="125" width="90" height="35" rx="8" fill="url(#clientGrad)"/>
  <text x="105" y="148" text-anchor="middle" fill="white" font-size="13" font-weight="bold">客户端</text>
  <rect x="370" y="125" width="90" height="35" rx="8" fill="url(#serverGrad)"/>
  <text x="415" y="148" text-anchor="middle" fill="white" font-size="13" font-weight="bold">服务端</text>

  <!-- Vertical timelines -->
  <line x1="105" y1="165" x2="105" y2="475" stroke="#4facfe" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="415" y1="165" x2="415" y2="475" stroke="#667eea" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 1: SYN -->
  <line x1="110" y1="200" x2="410" y2="230" stroke="#4facfe" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="180" y="195" width="150" height="26" rx="5" fill="#e8f7ff" stroke="#4facfe" stroke-width="1"/>
  <text x="255" y="213" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">① SYN (seq=x)</text>
  <text x="75" y="206" text-anchor="middle" fill="#888" font-size="10">CLOSED</text>
  <text x="445" y="206" text-anchor="middle" fill="#888" font-size="10">LISTEN</text>

  <!-- Step 2: SYN+ACK -->
  <line x1="410" y1="280" x2="110" y2="310" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="170" y="275" width="180" height="26" rx="5" fill="#f0edff" stroke="#667eea" stroke-width="1"/>
  <text x="260" y="293" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">② SYN+ACK (seq=y, ack=x+1)</text>
  <text x="445" y="280" text-anchor="middle" fill="#888" font-size="10">SYN_RCVD</text>

  <!-- Step 3: ACK -->
  <line x1="110" y1="360" x2="410" y2="390" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="190" y="355" width="140" height="26" rx="5" fill="#e6fff0" stroke="#43e97b" stroke-width="1"/>
  <text x="260" y="373" text-anchor="middle" fill="#2d9d5c" font-size="12" font-weight="bold">③ ACK (ack=y+1)</text>
  <text x="70" y="365" text-anchor="middle" fill="#888" font-size="10">ESTAB</text>

  <!-- Established -->
  <text x="70" y="440" text-anchor="middle" fill="#43e97b" font-size="11" font-weight="bold">ESTABLISHED</text>
  <text x="445" y="420" text-anchor="middle" fill="#43e97b" font-size="11" font-weight="bold">ESTABLISHED</text>

  <!-- Explanation -->
  <text x="265" y="465" text-anchor="middle" fill="#999" font-size="10">本质：双方互相确认"发送能力和接收能力都正常"</text>

  <!-- ===== RIGHT: Four-Way Teardown ===== -->
  <rect x="540" y="80" width="490" height="420" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="785" y="108" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">四次挥手（断连）</text>

  <!-- Client / Server columns -->
  <rect x="580" y="125" width="90" height="35" rx="8" fill="url(#clientGrad)"/>
  <text x="625" y="148" text-anchor="middle" fill="white" font-size="13" font-weight="bold">主动关闭</text>
  <rect x="890" y="125" width="90" height="35" rx="8" fill="url(#serverGrad)"/>
  <text x="935" y="148" text-anchor="middle" fill="white" font-size="13" font-weight="bold">被动关闭</text>

  <!-- Vertical timelines -->
  <line x1="625" y1="165" x2="625" y2="475" stroke="#4facfe" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="935" y1="165" x2="935" y2="475" stroke="#667eea" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 1: FIN -->
  <line x1="630" y1="195" x2="930" y2="215" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="720" y="190" width="120" height="24" rx="5" fill="#ffe6e6" stroke="#e74c3c" stroke-width="1"/>
  <text x="780" y="207" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">① FIN (seq=u)</text>
  <text x="597" y="200" text-anchor="middle" fill="#888" font-size="10">FIN_WAIT_1</text>

  <!-- Step 2: ACK -->
  <line x1="930" y1="260" x2="630" y2="280" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="720" y="255" width="130" height="24" rx="5" fill="#f0edff" stroke="#667eea" stroke-width="1"/>
  <text x="785" y="272" text-anchor="middle" fill="#667eea" font-size="11" font-weight="bold">② ACK (ack=u+1)</text>
  <text x="965" y="260" text-anchor="middle" fill="#888" font-size="10">CLOSE_WAIT</text>
  <text x="597" y="290" text-anchor="middle" fill="#888" font-size="10">FIN_WAIT_2</text>

  <!-- Step 3: FIN -->
  <line x1="930" y1="330" x2="630" y2="350" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="720" y="325" width="120" height="24" rx="5" fill="#ffe6e6" stroke="#e74c3c" stroke-width="1"/>
  <text x="780" y="342" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">③ FIN (seq=w)</text>
  <text x="965" y="332" text-anchor="middle" fill="#888" font-size="10">LAST_ACK</text>

  <!-- Step 4: ACK -->
  <line x1="630" y1="395" x2="930" y2="415" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="720" y="390" width="130" height="24" rx="5" fill="#e6fff0" stroke="#43e97b" stroke-width="1"/>
  <text x="785" y="407" text-anchor="middle" fill="#2d9d5c" font-size="11" font-weight="bold">④ ACK (ack=w+1)</text>
  <text x="597" y="400" text-anchor="middle" fill="#fa709a" font-size="10" font-weight="bold">TIME_WAIT</text>
  <text x="965" y="435" text-anchor="middle" fill="#888" font-size="10">CLOSED</text>

  <text x="785" y="465" text-anchor="middle" fill="#999" font-size="10">全双工：我不发了 ≠ 我也不收了</text>

  <!-- ===== BOTTOM: TIME_WAIT ===== -->
  <rect x="20" y="520" width="1010" height="165" rx="10" fill="white" stroke="#fa709a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="520" width="1010" height="35" rx="10" fill="url(#twGrad)"/>
  <rect x="20" y="540" width="1010" height="15" fill="url(#twGrad)"/>
  <text x="525" y="544" text-anchor="middle" fill="white" font-size="14" font-weight="bold">TIME_WAIT 的工程意义</text>

  <!-- Two reasons -->
  <rect x="40" y="570" width="480" height="50" rx="8" fill="#fff8f0" stroke="#fa709a" stroke-width="1"/>
  <text x="280" y="592" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">防止旧连接延迟包污染新连接</text>
  <text x="280" y="610" text-anchor="middle" fill="#888" font-size="11">等待 2MSL 确保旧连接的包从网络中消失</text>

  <rect x="540" y="570" width="475" height="50" rx="8" fill="#fff8f0" stroke="#fa709a" stroke-width="1"/>
  <text x="777" y="592" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">确保最后 ACK 的可靠送达</text>
  <text x="777" y="610" text-anchor="middle" fill="#888" font-size="11">如果最后 ACK 丢了，对方还能重发 FIN</text>

  <!-- Common issues -->
  <text x="525" y="655" text-anchor="middle" fill="#999" font-size="11">线上常见问题：TIME_WAIT 过多 → 端口耗尽 → 短连接风暴 → 连接没有复用好</text>

  <!-- Half/Full connection queue note -->
  <rect x="40" y="635" width="480" height="30" rx="6" fill="#f8f9fc" stroke="#e0e0e0" stroke-width="1"/>
  <text x="280" y="655" text-anchor="middle" fill="#666" font-size="11">半连接队列(SYN backlog) + 全连接队列(accept queue) → 堆积时建连超时</text>
</svg>
