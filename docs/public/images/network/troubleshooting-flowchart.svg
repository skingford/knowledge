<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 620" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="q1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="q2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="q3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="620" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <rect x="20" y="15" width="910" height="50" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="475" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">网络排障决策流程</text>

  <!-- ===== Step 1: Connect or Slow ===== -->
  <rect x="325" y="85" width="300" height="55" rx="27" fill="url(#q1Grad)" filter="url(#shadow)"/>
  <text x="475" y="110" text-anchor="middle" fill="white" font-size="14" font-weight="bold">第一步：连不上？还是连上了但慢？</text>

  <!-- Left branch: Can't connect -->
  <line x1="375" y1="140" x2="200" y2="175" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="268" y="155" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">连不上</text>

  <!-- Right branch: Connected but slow -->
  <line x1="575" y1="140" x2="750" y2="175" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="155" text-anchor="middle" fill="#4facfe" font-size="11" font-weight="bold">连上但慢</text>

  <!-- Can't connect box -->
  <rect x="60" y="180" width="280" height="130" rx="10" fill="white" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="205" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">连不上 → 先查</text>
  <text x="80" y="230" fill="#555" font-size="12">- DNS 解析是否成功</text>
  <text x="80" y="252" fill="#555" font-size="12">- 路由是否可达</text>
  <text x="80" y="274" fill="#555" font-size="12">- 防火墙 / 安全组规则</text>
  <text x="80" y="296" fill="#555" font-size="12">- 端口是否在监听 / 健康检查</text>

  <!-- Connected but slow box -->
  <rect x="610" y="180" width="280" height="130" rx="10" fill="white" stroke="#4facfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="205" text-anchor="middle" fill="#4facfe" font-size="13" font-weight="bold">连上但慢 → 再查</text>
  <text x="630" y="230" fill="#555" font-size="12">- RTT / 网络延迟</text>
  <text x="630" y="252" fill="#555" font-size="12">- TCP 握手 / 重传</text>
  <text x="630" y="274" fill="#555" font-size="12">- TLS 握手耗时</text>
  <text x="630" y="296" fill="#555" font-size="12">- 应用耗时 / 下游依赖慢</text>

  <!-- ===== Step 2: Scope ===== -->
  <line x1="475" y1="140" x2="475" y2="335" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="325" y="340" width="300" height="55" rx="27" fill="url(#q2Grad)" filter="url(#shadow)"/>
  <text x="475" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="bold">第二步：单点问题？还是全局问题？</text>

  <!-- Scope examples -->
  <rect x="120" y="415" width="710" height="55" rx="10" fill="white" stroke="#4facfe" stroke-width="1" filter="url(#shadow)"/>
  <text x="195" y="440" text-anchor="middle" fill="#555" font-size="11">只有某个机房慢?</text>
  <text x="345" y="440" text-anchor="middle" fill="#555" font-size="11">只有某个运营商慢?</text>
  <text x="500" y="440" text-anchor="middle" fill="#555" font-size="11">只有某个域名慢?</text>
  <text x="665" y="440" text-anchor="middle" fill="#555" font-size="11">只有 HTTPS 慢?</text>
  <text x="475" y="460" text-anchor="middle" fill="#999" font-size="10">这些差异能快速缩小排障范围</text>

  <!-- ===== Step 3: Tools ===== -->
  <line x1="475" y1="470" x2="475" y2="490" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="325" y="492" width="300" height="45" rx="22" fill="url(#q3Grad)" filter="url(#shadow)"/>
  <text x="475" y="520" text-anchor="middle" fill="white" font-size="14" font-weight="bold">第三步：选择排障工具</text>

  <!-- Tool boxes -->
  <rect x="30" y="555" width="130" height="48" rx="8" fill="#f0edff" stroke="#667eea" stroke-width="1" filter="url(#shadow)"/>
  <text x="95" y="575" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">dig / nslookup</text>
  <text x="95" y="593" text-anchor="middle" fill="#888" font-size="10">DNS 解析</text>

  <rect x="175" y="555" width="130" height="48" rx="8" fill="#e6fff0" stroke="#43e97b" stroke-width="1" filter="url(#shadow)"/>
  <text x="240" y="575" text-anchor="middle" fill="#2d9d5c" font-size="12" font-weight="bold">ping / mtr</text>
  <text x="240" y="593" text-anchor="middle" fill="#888" font-size="10">连通性 / 路由</text>

  <rect x="320" y="555" width="130" height="48" rx="8" fill="#e8f7ff" stroke="#4facfe" stroke-width="1" filter="url(#shadow)"/>
  <text x="385" y="575" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">curl -v</text>
  <text x="385" y="593" text-anchor="middle" fill="#888" font-size="10">状态码 / TLS</text>

  <rect x="465" y="555" width="130" height="48" rx="8" fill="#fff8e6" stroke="#ff9800" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="575" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">ss -tanp</text>
  <text x="530" y="593" text-anchor="middle" fill="#888" font-size="10">连接状态</text>

  <rect x="610" y="555" width="130" height="48" rx="8" fill="#fff0f5" stroke="#f5576c" stroke-width="1" filter="url(#shadow)"/>
  <text x="675" y="575" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">traceroute</text>
  <text x="675" y="593" text-anchor="middle" fill="#888" font-size="10">路由追踪</text>

  <rect x="755" y="555" width="165" height="48" rx="8" fill="#ffe6e6" stroke="#e74c3c" stroke-width="1" filter="url(#shadow)"/>
  <text x="837" y="575" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">tcpdump</text>
  <text x="837" y="593" text-anchor="middle" fill="#888" font-size="10">终极抓包分析</text>

  <!-- Connecting lines from step 3 to tools -->
  <line x1="475" y1="537" x2="95" y2="555" stroke="#ddd" stroke-width="1"/>
  <line x1="475" y1="537" x2="240" y2="555" stroke="#ddd" stroke-width="1"/>
  <line x1="475" y1="537" x2="385" y2="555" stroke="#ddd" stroke-width="1"/>
  <line x1="475" y1="537" x2="530" y2="555" stroke="#ddd" stroke-width="1"/>
  <line x1="475" y1="537" x2="675" y2="555" stroke="#ddd" stroke-width="1"/>
  <line x1="475" y1="537" x2="837" y2="555" stroke="#ddd" stroke-width="1"/>
</svg>
