<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 960" font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1360" height="960" rx="24" fill="#f8fafc"/>

  <rect x="30" y="20" width="1300" height="82" rx="18" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="680" y="56" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">Node.js 高并发底层解决方案总图</text>
  <text x="680" y="83" text-anchor="middle" fill="#cbd5e1" font-size="13">真正稀缺的不是“异步语法”，而是主线程时间片、连接池槽位、排队深度和恢复能力</text>

  <rect x="40" y="120" width="1280" height="120" rx="20" fill="#ffffff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="136" width="148" height="26" rx="13" fill="url(#blueGrad)"/>
  <text x="134" y="153" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">一、入口先过滤</text>

  <rect x="70" y="168" width="150" height="48" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="145" y="188" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">用户流量</text>
  <text x="145" y="205" text-anchor="middle" fill="#64748b" font-size="10">App / Web / 活动洪峰</text>

  <line x1="220" y1="192" x2="250" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="168" width="150" height="48" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="325" y="188" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">CDN / WAF</text>
  <text x="325" y="205" text-anchor="middle" fill="#64748b" font-size="10">缓存、验签、防刷</text>

  <line x1="400" y1="192" x2="430" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="168" width="150" height="48" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="505" y="188" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">LB / Gateway</text>
  <text x="505" y="205" text-anchor="middle" fill="#64748b" font-size="10">鉴权、路由、灰度</text>

  <line x1="580" y1="192" x2="610" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="610" y="168" width="170" height="48" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="695" y="188" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">限流 / 快速失败</text>
  <text x="695" y="205" text-anchor="middle" fill="#64748b" font-size="10">别把峰值原样送进主线程</text>

  <line x1="780" y1="192" x2="810" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="810" y="156" width="250" height="72" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="935" y="185" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">Node.js API / BFF / Web 层</text>
  <text x="935" y="205" text-anchor="middle" fill="#64748b" font-size="11">多实例、Keep-Alive、短平快请求主路径</text>

  <rect x="1080" y="160" width="210" height="64" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="1185" y="185" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="700">入口治理目标</text>
  <text x="1185" y="204" text-anchor="middle" fill="#7c2d12" font-size="10">过滤无效流量，保护主线程</text>

  <rect x="40" y="260" width="1280" height="290" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="276" width="188" height="26" rx="13" fill="url(#greenGrad)"/>
  <text x="154" y="293" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">二、Node.js 进程内部</text>

  <rect x="70" y="315" width="350" height="210" rx="16" fill="#f4fbf7" stroke="#86efac" stroke-width="1.5"/>
  <text x="245" y="340" text-anchor="middle" fill="#166534" font-size="14" font-weight="700">主线程 / Event Loop</text>
  <text x="245" y="358" text-anchor="middle" fill="#64748b" font-size="10">适合短 I/O 协调，不适合长时间同步计算</text>

  <rect x="92" y="374" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="161" y="396" text-anchor="middle" fill="#0f172a" font-size="11">路由 / 参数校验</text>

  <rect x="92" y="418" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="161" y="440" text-anchor="middle" fill="#0f172a" font-size="11">本地缓存 / 快速失败</text>

  <rect x="92" y="462" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="161" y="484" text-anchor="middle" fill="#0f172a" font-size="11">流式响应 / 短 I/O</text>

  <rect x="260" y="374" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="329" y="396" text-anchor="middle" fill="#0f172a" font-size="11">microtask / Promise</text>

  <rect x="260" y="418" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="329" y="440" text-anchor="middle" fill="#0f172a" font-size="11">请求内并发上限</text>

  <rect x="260" y="462" width="138" height="34" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.2"/>
  <text x="329" y="484" text-anchor="middle" fill="#0f172a" font-size="11">event loop delay</text>

  <rect x="92" y="504" width="306" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="245" y="518" text-anchor="middle" fill="#b91c1c" font-size="10" font-weight="700">同步 JSON、排序、模板渲染、压缩会拖慢整批请求</text>

  <rect x="455" y="315" width="250" height="210" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="580" y="340" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">I/O 扩展能力</text>
  <text x="580" y="358" text-anchor="middle" fill="#64748b" font-size="10">异步并不等于无限吞吐，后面仍有真实资源池</text>

  <rect x="480" y="374" width="200" height="48" rx="12" fill="#ffffff" stroke="#dbeafe" stroke-width="1.2"/>
  <text x="580" y="394" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">libuv 线程池</text>
  <text x="580" y="411" text-anchor="middle" fill="#64748b" font-size="10">fs / crypto / zlib / 部分 dns</text>

  <rect x="480" y="434" width="200" height="38" rx="12" fill="#ffffff" stroke="#dbeafe" stroke-width="1.2"/>
  <text x="580" y="457" text-anchor="middle" fill="#0f172a" font-size="11">HTTP Client Keep-Alive 池</text>

  <rect x="480" y="482" width="200" height="30" rx="12" fill="#ffffff" stroke="#dbeafe" stroke-width="1.2"/>
  <text x="580" y="501" text-anchor="middle" fill="#0f172a" font-size="11">DB / Redis 驱动连接</text>

  <line x1="420" y1="392" x2="455" y2="392" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="420" y1="438" x2="455" y2="452" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="420" y1="480" x2="455" y2="497" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="740" y="315" width="550" height="210" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1015" y="340" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">资源边界与保护动作</text>
  <text x="1015" y="358" text-anchor="middle" fill="#64748b" font-size="10">高并发治理不是放大并发，而是把并发做成可控</text>

  <rect x="765" y="376" width="118" height="40" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="824" y="393" text-anchor="middle" fill="#312e81" font-size="11" font-weight="700">主线程时间片</text>
  <text x="824" y="408" text-anchor="middle" fill="#64748b" font-size="9">别做长同步任务</text>

  <rect x="894" y="376" width="118" height="40" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="953" y="393" text-anchor="middle" fill="#312e81" font-size="11" font-weight="700">连接池槽位</text>
  <text x="953" y="408" text-anchor="middle" fill="#64748b" font-size="9">别随副本无脑膨胀</text>

  <rect x="1023" y="376" width="118" height="40" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="1082" y="393" text-anchor="middle" fill="#312e81" font-size="11" font-weight="700">排队深度</text>
  <text x="1082" y="408" text-anchor="middle" fill="#64748b" font-size="9">堆积会放大尾延迟</text>

  <rect x="1152" y="376" width="118" height="40" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="1211" y="393" text-anchor="middle" fill="#312e81" font-size="11" font-weight="700">RSS / GC</text>
  <text x="1211" y="408" text-anchor="middle" fill="#64748b" font-size="9">对象积压恢复慢</text>

  <rect x="765" y="434" width="80" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="805" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">超时</text>

  <rect x="856" y="434" width="80" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="896" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">并发隔离</text>

  <rect x="947" y="434" width="80" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="987" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">熔断</text>

  <rect x="1038" y="434" width="80" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="1078" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">背压</text>

  <rect x="1129" y="434" width="80" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="1169" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">重试预算</text>

  <rect x="1220" y="434" width="50" height="34" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="1245" y="456" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">降级</text>

  <rect x="765" y="484" width="505" height="28" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="1017" y="503" text-anchor="middle" fill="#b91c1c" font-size="10" font-weight="700">不要让 Promise.all 把单请求 fan-out 放大到 Redis、DB 和第三方依赖</text>

  <rect x="40" y="570" width="1280" height="190" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="586" width="188" height="26" rx="13" fill="url(#orangeGrad)"/>
  <text x="154" y="603" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">三、把重活搬出主路径</text>

  <rect x="90" y="628" width="220" height="80" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="200" y="654" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">Worker Threads</text>
  <text x="200" y="674" text-anchor="middle" fill="#7c2d12" font-size="10">CPU 密集计算、报表、图片、压缩</text>
  <text x="200" y="691" text-anchor="middle" fill="#64748b" font-size="10">主线程只负责调度，不负责硬算</text>

  <line x1="310" y1="668" x2="350" y2="668" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="350" y="628" width="220" height="80" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="460" y="654" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">Queue / Outbox</text>
  <text x="460" y="674" text-anchor="middle" fill="#7c2d12" font-size="10">异步削峰、削弱同步耦合</text>
  <text x="460" y="691" text-anchor="middle" fill="#64748b" font-size="10">先入队，再慢慢消费</text>

  <line x1="570" y1="668" x2="610" y2="668" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="610" y="628" width="220" height="80" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="720" y="654" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">Consumer / Worker 服务</text>
  <text x="720" y="674" text-anchor="middle" fill="#7c2d12" font-size="10">按能力设置消费并发</text>
  <text x="720" y="691" text-anchor="middle" fill="#64748b" font-size="10">不要把数据库再一起拖死</text>

  <line x1="830" y1="668" x2="870" y2="668" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="870" y="628" width="220" height="80" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="980" y="654" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">延迟任务 / 重试 / 补偿</text>
  <text x="980" y="674" text-anchor="middle" fill="#7c2d12" font-size="10">失败恢复、幂等、最终一致</text>
  <text x="980" y="691" text-anchor="middle" fill="#64748b" font-size="10">活动高峰后也能慢慢回补</text>

  <path d="M 460 628 L 460 612 L 1195 612 L 1195 635" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowGreen)"/>
  <rect x="1110" y="635" width="170" height="60" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="1195" y="657" text-anchor="middle" fill="#166534" font-size="12" font-weight="700">接口快速返回</text>
  <text x="1195" y="675" text-anchor="middle" fill="#64748b" font-size="10">受理中 / taskId / 排队中</text>

  <rect x="90" y="718" width="1190" height="24" rx="12" fill="#fff1e6" stroke="#fdba74" stroke-width="1"/>
  <text x="685" y="734" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">CPU 重任务、批量导出、第三方慢调用、回调补偿，都应尽量脱离请求主路径</text>

  <rect x="40" y="780" width="1280" height="160" rx="20" fill="#ffffff" stroke="#ddd6fe" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="796" width="172" height="26" rx="13" fill="url(#purpleGrad)"/>
  <text x="146" y="813" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">四、下游与可观测性</text>

  <rect x="80" y="836" width="220" height="68" rx="14" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="190" y="861" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">Redis / 热点缓存</text>
  <text x="190" y="880" text-anchor="middle" fill="#64748b" font-size="10">热点 key、回源保护、Cache Aside</text>

  <rect x="330" y="836" width="260" height="68" rx="14" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="460" y="861" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">MySQL / PostgreSQL 连接池</text>
  <text x="460" y="880" text-anchor="middle" fill="#64748b" font-size="10">事务边界、慢 SQL、连接数预算</text>

  <rect x="620" y="836" width="220" height="68" rx="14" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="730" y="861" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">第三方 API / 配额</text>
  <text x="730" y="880" text-anchor="middle" fill="#64748b" font-size="10">超时、限额、慢依赖隔离</text>

  <rect x="870" y="836" width="180" height="68" rx="14" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="960" y="861" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">MQ / Lag</text>
  <text x="960" y="880" text-anchor="middle" fill="#64748b" font-size="10">积压、重试、死信</text>

  <rect x="1080" y="826" width="210" height="88" rx="16" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1185" y="848" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">Metrics / Logs / Tracing</text>
  <text x="1185" y="868" text-anchor="middle" fill="#475569" font-size="10">QPS、RT、Error、Event Loop Delay</text>
  <text x="1185" y="884" text-anchor="middle" fill="#475569" font-size="10">UV Queue、Pool Usage、RSS、GC</text>
  <text x="1185" y="900" text-anchor="middle" fill="#475569" font-size="10">Queue Lag、重试率、下游超时率</text>

  <text x="680" y="930" text-anchor="middle" fill="#64748b" font-size="11">Node.js 高并发治理顺序: 先入口限流，再把主线程做薄，再控制连接池和排队深度，最后靠观测闭环</text>
</svg>
