  </text>

  <g transform="translate(96 470)">
    <rect width="224" height="52" rx="26" fill="#f4ede3" />
    <text x="32" y="34" fill="#1c1714" font-family="Manrope, 'Noto Sans SC', sans-serif" font-size="24" font-weight="800">
